<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woorie — Мир уютных комиксов</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Слайдер на фоне -->
    <div class="background-slider">
        <div class="bg-slide active" style="background-image: url('images/bg1.jpg');"></div>
        <div class="bg-slide" style="background-image: url('images/bg2.jpg');"></div>
        <div class="bg-slide" style="background-image: url('images/bg3.jpg');"></div>
    </div>

    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" class="site-logo">Woorie</a>
            <button class="hamburger" aria-label="Открыть меню">☰</button>
            <nav>
                <ul>
                    <li><a href="index.html" class="active">Главная</a></li>
                    <li><a href="comics.html">Комиксы</a></li>
                    <li><a href="about.html">Об авторе</a></li>
                    <li><a href="merch.html">Мерч</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section1">
        <h1>Уютный мир комиксов Woorie</h1>
        <p>Истории, наполненные ароматом кофе, осенними листьями и капелькой душевного тепла.</p>
        <a href="comics.html" class="btn-read">Начать чтение</a>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Мобильное меню
            const hamburger = document.querySelector('.hamburger');
            const nav = document.querySelector('nav');
            hamburger.addEventListener('click', function() {
                nav.classList.toggle('open');
                hamburger.textContent = nav.classList.contains('open') ? '✕' : '☰';
            });

            // Слайдер фона
            const slides = document.querySelectorAll('.bg-slide');
            let currentSlide = 0;
            if (slides.length > 1) {
                setInterval(() => {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 5000);
            }
        });
    </script>
</body>
</html>
